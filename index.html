<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="to-do-app">
            <h1>To-Do List <img src="Assets/icon.png" alt=""></h1>

            <div class="row">
                <input type="text" placeholder="Enter task" id="input-box">
                <button onclick="addTask()" id="add">Add</button>
            </div>

            <h2><b>Tasks</b></h2>
            <ul id="list-container"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
